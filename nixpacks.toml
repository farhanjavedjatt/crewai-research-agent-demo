# Nixpacks build configuration for Railway.
# Pins Python 3.11 and installs from requirements.txt + the local package.

[phases.setup]
nixPkgs = ["python311", "gcc"]

[phases.install]
cmds = [
    "python -m venv /opt/venv",
    ". /opt/venv/bin/activate && pip install --upgrade pip",
    ". /opt/venv/bin/activate && pip install -r requirements.txt",
    ". /opt/venv/bin/activate && pip install -e ."
]

[phases.build]
cmds = ["echo 'Build complete.'"]

[start]
# Shell-free launcher handles PORT lookup in Python — avoids Nixpacks's
# quirky $VAR expansion across exec vs. shell invocations.
cmd = "/opt/venv/bin/python start.py"

[variables]
PYTHONUNBUFFERED = "1"
PIP_NO_CACHE_DIR = "1"
